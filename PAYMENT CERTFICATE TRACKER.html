<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Certificate Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn {
      background: #1e3a8a;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #3749a6;
    }
  </style>
</head>

<body>

  <header>
    Payment Certificate Tracker
  </header>

  <div class="container">

    <div class="card">
      <h3>Welcome Dashboard</h3>
      <p>This system helps you manage subcontractor payment certificates.</p>
    </div>

    <div class="card">
      <h3>Create New Payment Certificate</h3>
      <button class="btn">+ Add PC</button>
    </div>

    <div class="card">
      <h3>View Reports</h3>
      <button class="btn">Open Reports</button>
    </div>

  </div>

</body>
</html>
